<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POV Archery: Flying Targets</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; overflow: hidden; font-family: Inter, system-ui, Arial, sans-serif; background: #0b1220; }
    #hud {
      position: fixed; top: 12px; left: 12px; z-index: 3;
      background: rgba(10,15,25,0.7); padding: 10px 14px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(4px);
    }
    #hud h1 { margin: 0 0 6px; font-size: 16px; }
    #hud p { margin: 4px 0; font-size: 14px; }
    #crosshair {
      position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 28px; height: 28px; z-index: 2; pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ""; position: absolute; background: rgba(255,255,255,0.95);
    }
    #crosshair::before { width: 2px; height: 28px; left: 13px; top: 0; }
    #crosshair::after { height: 2px; width: 28px; left: 0; top: 13px; }
    #overlay {
      position: fixed; inset: 0; z-index: 4; display: grid; place-items: center;
      background: radial-gradient(circle at center, rgba(10,16,30,0.45), rgba(2,4,10,0.86));
      text-align: center; padding: 20px;
    }
    #overlay .card {
      max-width: 560px; background: rgba(15,20,35,0.82);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 20px;
    }
    button {
      margin-top: 12px; border: none; border-radius: 8px; padding: 10px 16px;
      color: white; background: #2d72ff; font-size: 15px; cursor: pointer;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="hud">
    <h1>🏹 POV Archery</h1>
    <p>Score: <strong id="score">0</strong></p>
    <p>Arrows: <strong id="arrows">30</strong></p>
    <p>Mouse to aim, click to shoot</p>
  </div>
  <div id="crosshair" aria-hidden="true"></div>
  <div id="overlay">
    <div class="card">
      <h2>Hit as many flying targets as you can!</h2>
      <p>Press <b>Start</b>, then move your mouse to aim. Click to fire arrows.</p>
      <p>Each hit gives +10 points. Reload after arrows run out by pressing R.</p>
      <button id="startBtn">Start Game</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.165.0/build/three.module.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87c8ff);
    scene.fog = new THREE.Fog(0x87c8ff, 40, 180);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 2, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xddefff, 0x305020, 1.1);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(12, 20, 8);
    scene.add(sun);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(400, 400),
      new THREE.MeshLambertMaterial({ color: 0x3f8c45 })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    const scoreEl = document.getElementById('score');
    const arrowsEl = document.getElementById('arrows');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');

    let score = 0;
    let arrows = 30;

    const targets = [];
    const targetGeo = new THREE.SphereGeometry(1.1, 24, 24);

    function spawnTarget() {
      const mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color().setHSL(Math.random(), 0.7, 0.5),
        roughness: 0.45,
        metalness: 0.2
      });
      const mesh = new THREE.Mesh(targetGeo, mat);
      const radius = 18 + Math.random() * 38;
      const theta = Math.random() * Math.PI * 2;
      const y = 6 + Math.random() * 16;
      mesh.position.set(Math.cos(theta) * radius, y, Math.sin(theta) * radius);
      mesh.userData = {
        orbitCenter: new THREE.Vector3((Math.random() - 0.5) * 12, y, (Math.random() - 0.5) * 12),
        orbitRadius: 7 + Math.random() * 12,
        angle: Math.random() * Math.PI * 2,
        speed: 0.35 + Math.random() * 0.8,
        bob: Math.random() * Math.PI * 2,
        bobSpeed: 0.8 + Math.random() * 1.4,
      };
      scene.add(mesh);
      targets.push(mesh);
    }

    for (let i = 0; i < 12; i++) spawnTarget();

    let yaw = 0, pitch = 0;
    const sensitivity = 0.0026;
    function onMouseMove(e) {
      yaw -= e.movementX * sensitivity;
      pitch -= e.movementY * sensitivity;
      pitch = Math.max(-1.2, Math.min(1.2, pitch));
    }

    const raycaster = new THREE.Raycaster();
    const center = new THREE.Vector2(0, 0);

    function shoot() {
      if (arrows <= 0) return;
      arrows--;
      arrowsEl.textContent = arrows;

      raycaster.setFromCamera(center, camera);
      const hits = raycaster.intersectObjects(targets, false);
      if (hits.length > 0) {
        const hit = hits[0].object;
        score += 10;
        scoreEl.textContent = score;

        hit.position.set((Math.random() - 0.5) * 70, 7 + Math.random() * 18, (Math.random() - 0.5) * 70);
        hit.material.color.setHSL(Math.random(), 0.7, 0.5);
      }
    }

    window.addEventListener('click', () => {
      if (document.pointerLockElement === renderer.domElement) shoot();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'r') {
        arrows = 30;
        arrowsEl.textContent = arrows;
      }
    });

    startBtn.addEventListener('click', () => {
      renderer.domElement.requestPointerLock();
    });

    document.addEventListener('pointerlockchange', () => {
      const locked = document.pointerLockElement === renderer.domElement;
      overlay.style.display = locked ? 'none' : 'grid';
      if (locked) document.addEventListener('mousemove', onMouseMove);
      else document.removeEventListener('mousemove', onMouseMove);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();

      camera.rotation.order = 'YXZ';
      camera.rotation.y = yaw;
      camera.rotation.x = pitch;

      for (const t of targets) {
        t.userData.angle += dt * t.userData.speed;
        t.userData.bob += dt * t.userData.bobSpeed;
        t.position.x = t.userData.orbitCenter.x + Math.cos(t.userData.angle) * t.userData.orbitRadius;
        t.position.z = t.userData.orbitCenter.z + Math.sin(t.userData.angle) * t.userData.orbitRadius;
        t.position.y = t.userData.orbitCenter.y + Math.sin(t.userData.bob) * 1.4;
      }

      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
